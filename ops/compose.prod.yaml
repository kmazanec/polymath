# Polymath production compose for the gauntlet droplet (see workspace INFRA.md +
# .infra/NEW_APP.md). This is the DEPLOYED stack — distinct from the repo-root
# docker-compose.yml, which is the LOCAL-dev stack that also runs its own Caddy.
#
# Differences from local dev (deliberate, to match the droplet conventions):
#   * No `caddy` service — the shared `openemr-caddy-1` fronts every app; this
#     stack joins `openemr_default` so Caddy reaches `web`/`agent` by name.
#   * No host port mappings — Caddy is the only thing on 80/443.
#   * Build contexts are the absolute `/srv/polymath/current` symlink (the
#     release deploy.sh swaps), so images always match the deployed SHA.
#   * Secrets come from the operator-placed /etc/polymath/.env (env_file).
#   * Postgres data is a host bind-mount at /opt/polymath/postgres — OUTSIDE the
#     release tree, so it survives every release swap.
#
# Project name pinned so named resources stay stable across path changes.
name: polymath

services:
  postgres:
    image: postgres:16-alpine
    container_name: polymath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polymath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in /etc/polymath/.env}
      POSTGRES_DB: ${POSTGRES_DB:-polymath}
    volumes:
      # Persistent data, outside the release tree (survives release swaps).
      - /opt/polymath/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-polymath}']
      interval: 10s
      timeout: 5s
      retries: 10
    # Internal-only: reachable on the private network, never on a host port.
    networks:
      - internal

  agent:
    build:
      context: /srv/polymath/current
      dockerfile: apps/agent/Dockerfile
      # Explicit prod stage. The Dockerfile's last stage is `dev` (tsx watch, local
      # hot-reload only); an untargeted build would ship that to the droplet. Pin
      # the production `runtime` stage. (dev-stack HMR.)
      target: runtime
    image: polymath-agent:${GIT_SHA:-latest}
    container_name: polymath-agent
    restart: unless-stopped
    env_file:
      - /etc/polymath/.env
    environment:
      PORT: '8080'
      # Browser origins allowed to open the /agent WebSocket (CSWSH defense in
      # apps/agent/src/server.ts verifyClient). MUST include the public origin or
      # the agent falls back to the localhost-only default and rejects real
      # browsers with 401, leaving the lesson's Continue button disabled. The
      # env_file may override; this default guarantees the live origin is allowed.
      ALLOWED_WS_ORIGINS: ${ALLOWED_WS_ORIGINS:-https://polymath.biograph.dev}
      # Compose-network DNS; password comes from the env_file above.
      POSTGRES_URL: postgres://${POSTGRES_USER:-polymath}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-polymath}
      # Point the agent's OTLP exporter at the sidecar collector (compose-network DNS).
      # registerOtel() fails closed, so if the collector is absent the agent still boots.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: polymath-agent
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'node', '-e', "fetch('http://localhost:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 12
    networks:
      - internal
      - openemr_default

  web:
    build:
      context: /srv/polymath/current
      dockerfile: apps/web/Dockerfile
      # Prod static-bundle stage (the Dockerfile's `dev` Vite stage is local-only).
      target: runtime
      # Vite INLINES import.meta.env at BUILD time, so PostHog config must reach
      # `docker build` as build args — compose env_file is runtime-only and never
      # reaches the build (MR !8 review). Without this the deployed bundle ships
      # PostHog permanently disabled even when /etc/polymath/.env sets the keys.
      # Blank default keeps PostHog fail-closed (no-op) when unset.
      args:
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-}
    image: polymath-web:${GIT_SHA:-latest}
    container_name: polymath-web
    restart: unless-stopped
    networks:
      - openemr_default

  # F-16 chat-baseline SPA (static bundle, served under /baseline/). Its REST
  # routes live on the agent (/api/baseline/*, topology D2); this is static only.
  # Joined to openemr_default so the shared host Caddy reaches it by name.
  baseline:
    build:
      context: /srv/polymath/current
      dockerfile: apps/baseline/Dockerfile
    image: polymath-baseline:${GIT_SHA:-latest}
    container_name: polymath-baseline
    restart: unless-stopped
    networks:
      - openemr_default

  # OTel collector sidecar — receives OTLP from the agent (voice-turn spans) and exports
  # to its own logs by default (key-free demo fallback) or an optional upstream backend.
  # Internal-only: the agent reaches it by name on the private network; never host-exposed.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: polymath-otel-collector
    restart: unless-stopped
    command: ['--config=/etc/otelcol/config.yaml']
    volumes:
      - /srv/polymath/current/ops/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - internal

networks:
  # Private network for agent <-> postgres + agent <-> otel-collector; no host exposure.
  internal:
    driver: bridge
  # Shared network the host Caddy lives on. `external: true` — the openemr stack
  # creates it; compose fails loudly if it's missing.
  openemr_default:
    external: true
