name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: polymath
          POSTGRES_PASSWORD: polymath
          POSTGRES_DB: polymath
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polymath"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # The agent integration test boots its own throwaway Postgres via Docker,
      # but CI also provides this service for any direct DB-backed checks.
      POSTGRES_URL: postgres://polymath:polymath@localhost:5432/polymath
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test (packages + integration)
        run: pnpm -r test

      - name: Build
        run: pnpm build
