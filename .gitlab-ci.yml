# Polymath CI, on the shared `gauntlet` droplet (see workspace INFRA.md §5 and
# .infra/NEW_APP.md §5).
#
# EXECUTOR NOTE: the `gauntlet-droplet` runner is a *shell* executor, so the
# GitLab `image:` keyword is IGNORED — jobs run directly on the host shell, which
# has Docker + git but no Node/pnpm toolchain. We therefore run the real test work
# inside a `node:22` container via `docker run`. The host only needs Docker.
#
# OWNERSHIP RULE (the bug that breaks sibling pipelines): the shell executor reuses
# a PERSISTENT checkout dir ($CI_PROJECT_DIR) across runs, and `get_sources` cleans
# it as the gitlab-runner host user. If a job writes into that dir from a container
# running as ROOT (node_modules, dist, .pnpm-store), those root-owned files become
# un-deletable and the next pipeline's checkout fails with "Permission denied". So:
# jobs MUST NOT write build artifacts back into $CI_PROJECT_DIR. We bind-mount the
# checkout READ-ONLY at /src, copy it to a throwaway /work INSIDE the (--rm)
# container, and do all writes there. Nothing persists to the host workspace.

stages:
  - verify
  - deploy

default:
  tags:
    - gauntlet-droplet

# Automated code + security review on merge requests, via the shared
# gitlab-cursor-review template (Cursor CLI). Runs on the dedicated cursor-review
# runner — the job's own tags/image/before_script override our default block.
# Requires repo CI/CD variables CURSOR_API_KEY and GITLAB_REVIEW_BOT_TOKEN.
include:
  - project: 'keithmazanec/gitlab-cursor-review'
    ref: main
    file: '/templates/cursor-review.yml'

# Pipelines on MRs (full verify) and on pushes to main (verify + deploy).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"

# Typecheck + unit tests + the package suites + the build. Pure-node work, no DB.
# pnpm via corepack; everything written under the throwaway /work copy.
#
# SECRET-EXPOSURE DEFENSE (review thread 1): this job runs on EVERY merge_request_event,
# including same-project MRs that can run arbitrary scripts/tests from the MR branch. It
# therefore MUST stay OFFLINE-ONLY — it does NOT receive `OPENAI_API_KEY` (a malicious MR
# could otherwise exfiltrate it from this container). The F-11 explain-back eval's
# ALWAYS-ON offline preconditions-vs-labels assertion (`@polymath/graph`'s eval.test.ts;
# the checkout copy includes `evals/`) is a hard block here and needs no key — the
# `liveIt` LLM-judge run self-skips without `OPENAI_API_KEY`. The live ≥90%-agreement
# judge gate moves to `explain_back_live_eval` below (protected-branch / manual,
# maintainer-only), where the protected variable is exposed only to trusted code.
verify:
  stage: verify
  needs: []
  resource_group: heavy-droplet # serialize w/ other heavy jobs (7.8G droplet)
  script:
    - >
      docker run --rm
      -v "$CI_PROJECT_DIR":/src:ro
      node:22-bookworm-slim
      bash -c "set -e &&
        cp -a /src /work && cd /work &&
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm -r typecheck &&
        pnpm -r --filter '!@polymath/agent' test &&
        pnpm build"

# The live LLM-judge ≥90%-agreement eval (F-11 AC#6) — the ONLY job that touches
# `OPENAI_API_KEY`. Kept OFF MR pipelines so an untrusted same-project MR can never see
# the key (review thread 1). It runs:
#   - automatically on a push to `main` (protected branch → the protected `OPENAI_API_KEY`
#     variable is available only to code that already landed on the trusted branch), and
#   - manually otherwise, gated on a protected variable a maintainer triggers — so the
#     key is exposed only to code a maintainer has reviewed, never to arbitrary MR scripts.
# It re-runs `@polymath/graph`'s eval.test.ts WITH the key, so the `liveIt` gate fires.
explain_back_live_eval:
  stage: verify
  needs: []
  resource_group: heavy-droplet
  rules:
    # Protected branch (main): auto-run with the protected variable.
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    # Never on merge-request pipelines (the secret-exposure vector). Otherwise allow a
    # maintainer to trigger it manually (web/API), non-blocking.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: manual
      allow_failure: true
  script:
    - >
      docker run --rm
      -v "$CI_PROJECT_DIR":/src:ro
      -e OPENAI_API_KEY="$OPENAI_API_KEY"
      node:22-bookworm-slim
      bash -c "set -e &&
        cp -a /src /work && cd /work &&
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm --filter @polymath/graph exec vitest run src/explainback/eval.test.ts"

# LangSmith trace verification — the ONLY job that touches `LANGCHAIN_API_KEY`. Modelled
# byte-for-byte on `explain_back_live_eval`: kept OFF merge-request pipelines so an
# untrusted same-project MR can never read the key (it could otherwise modify a script to
# exfiltrate it; masking only hides log output). It runs the agent against a live LLM with
# tracing on, so a trace lands in the `polymath-dev`/`polymath-demo` LangSmith project — a
# human confirms it in the LangSmith UI (criterion 4). LangChain's `ChatOpenAI` tracing is
# purely env-driven via `@langchain/core`, so NO code wrap is needed — only the env tuple.
# Runs:
#   - automatically on a push to `main` (protected branch → the protected variables are
#     exposed only to code already landed on the trusted branch), and
#   - manually otherwise (maintainer-triggered), non-blocking.
langsmith_live_verify:
  stage: verify
  needs: []
  resource_group: heavy-droplet
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: manual
      allow_failure: true
  script:
    - >
      docker run --rm
      -v "$CI_PROJECT_DIR":/src:ro
      -e OPENAI_API_KEY="$OPENAI_API_KEY"
      -e LANGCHAIN_TRACING_V2="true"
      -e LANGCHAIN_API_KEY="$LANGCHAIN_API_KEY"
      -e LANGCHAIN_PROJECT="polymath-dev"
      node:22-bookworm-slim
      bash -c "set -e &&
        cp -a /src /work && cd /work &&
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm --filter @polymath/graph exec vitest run src/explainback/eval.test.ts"

# The agent suite incl. the WS+Postgres integration test. The integration test
# connects to TEST_POSTGRES_URL (a sibling container) instead of spawning its own
# Docker pg — the shell-executor test container has no Docker socket. Sibling pg
# is on a throwaway $CI_JOB_ID-scoped network, cleaned in after_script.
agent_test:
  stage: verify
  needs: []
  resource_group: heavy-droplet
  script:
    - NET="polymath-ci-$CI_JOB_ID"
    - PG="polymath-ci-pg-$CI_JOB_ID"
    - docker network create "$NET"
    - >
      docker run -d --name "$PG" --network "$NET" --network-alias postgres
      -e POSTGRES_USER=polymath -e POSTGRES_PASSWORD=polymath -e POSTGRES_DB=polymath
      postgres:16-alpine
    - for i in $(seq 1 30); do docker exec "$PG" pg_isready -U polymath && break; sleep 1; done
    - >
      docker run --rm --network "$NET"
      -v "$CI_PROJECT_DIR":/src:ro
      -e TEST_POSTGRES_URL=postgres://polymath:polymath@postgres:5432/polymath
      node:22-bookworm-slim
      bash -c "set -e &&
        cp -a /src /work && cd /work &&
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm --filter @polymath/agent test"
  after_script:
    - docker rm -f "polymath-ci-pg-$CI_JOB_ID" 2>/dev/null || true
    - docker network rm "polymath-ci-$CI_JOB_ID" 2>/dev/null || true

# Cursor code + security review (see the `include:` above). Inherits the
# template's cursor-review runner tag, cursor-ci image, rules (manual on MRs),
# and before_script — none of our default applies here. Shares the `verify`
# stage so it runs in parallel with the test jobs on an MR.
cursor_code_review:
  extends: .cursor_review
  stage: verify
  needs: []

# Deploy the default branch to the droplet behind Caddy (release-symlink pattern).
# Native shell (rsync, symlink swap, docker compose) — NOT wrapped in docker run.
# Runs only on a push to main and only after the verify jobs are green.
deploy:
  stage: deploy
  needs:
    - verify
    - agent_test
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  variables:
    # Pin the deploy to THIS pipeline's commit so deploy.sh ships exactly what was
    # verified — not whatever the branch head is at deploy time (defends needs:).
    DEPLOY_SHA: $CI_COMMIT_SHA
  script:
    - bash ./infra/deploy.sh
  environment:
    name: production
    url: https://polymath.biograph.dev
